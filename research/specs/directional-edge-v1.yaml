spec_id: directional-edge-v1
strategy_spec_id: v1
phase: directional_edge
status: frozen_candidate

question: >
  Does bullish intraday continuation have enough standalone same-session edge
  to justify further work on options-based expressions?

dataset:
  version: dataset-v1
  required_inputs:
    - spx_spot_intraday
    - es_or_mes_intraday
    - trading_calendar

split_policy:
  train_fraction: 0.6
  validation_fraction: 0.2
  holdout_fraction: 0.2
  holdout_policy: most_recent_untouched_window

signal:
  candidate_id: D1
  setup_type: bullish_intraday_continuation
  description: >
    One bullish continuation signal opportunity per eligible session. The
    implementation must record `entered = false` and `skip_reason = no_signal`
    when confirmation does not occur.
  confirmation_logic: >
    Cumulative intraday return from session_open_price to signal_time_price
    must be at least signal_threshold. Prices are taken from the OPEN of the
    1-minute bar at each timestamp (i.e. price observed at HH:MM:00 ET).
  signal_threshold: 0.0025  # 0.25% open-to-10:30 cumulative return
  session_open_time_et: "09:30"  # NYSE cash open
  earliest_eligible_signal_time_et: "10:30"
  latest_eligible_signal_time_et: "10:30"
  rationale: >
    Single fixed signal time at 10:30 ET to keep v1 tight (no time-of-day
    cross-section to worry about). Matches the bot's default entryTimeEt.
    +0.25% threshold is the simplest "open is up materially" definition;
    sweep-friendly later if v1 conclusion is ambiguous.

horizon:
  exit_basis: fixed_same_session_window
  end_of_window_time_et: "15:55"
  rationale: >
    15:55 ET avoids the last-5-min closing-auction print noise without giving
    up much of the directional move. Using OPEN of the 15:55 bar = price
    observed at 15:55:00 ET.
  underlying_v1: es_front_month
  underlying_v1_rationale: >
    SPX is TBD per data-acquisition-decision; ES front-month is a valid
    proxy intraday (~0.99 correlation with SPX). If v1 returns EDGE PRESENT
    we cross-validate against SPX once that dataset lands.
  pinned_2026_04_30: true

outputs:
  report_path: research/reports/directional-edge-v1.md
  ledger_path: research/reports/directional-edge-v1-ledger.csv
  required_metrics:
    - trade_count
    - entered_vs_skipped
    - mean_forward_return
    - median_forward_return
    - hit_rate
    - left_tail_loss
    - regime_slices_if_available

decision_rules:
  continue_if:
    - standalone_directional_expectancy_is_positive
    - result_is_not_concentrated_in_one_small_regime_cluster
    - result_is_reproducible
  kill_if:
    - standalone_directional_expectancy_is_near_zero_or_negative
    - behavior_is_obviously_regime_fragile_without_a_salvageable_base_signal

notes:
  - This phase does not use options structure.
  - This phase should kill weak ideas quickly before building more complexity.
